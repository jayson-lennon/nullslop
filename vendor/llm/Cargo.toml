[package]
name = "llm"
version = "1.3.8"
edition = "2021"
description = "A Rust library unifying multiple LLM backends."
license = "MIT"
authors = [
    "Tristan Granier <graniet75@gmail.com>",
    "Jared Kofron <jared.kofron@gmail.com>",
]
repository = "https://github.com/graniet/llm"
documentation = "https://docs.rs/llm"
homepage = "https://github.com/graniet/llm"

[features]
default = ["default-tls"]
default-tls = ["reqwest/default-tls"]
rustls-tls = ["reqwest/rustls-tls"]
full = [
    "openai",
    "anthropic",
    "ollama",
    "deepseek",
    "xai",
    "phind",
    "google",
    "groq",
    "azure_openai",
    "elevenlabs",
    "agent",
    "cohere",
    "mistral",
    "openrouter",
    "huggingface",
    "bedrock",
]
openai = []
anthropic = []
ollama = []
deepseek = []
xai = []
phind = []
google = []
groq = []
azure_openai = []
cohere = []
mistral = []
openrouter = []
huggingface = []
bedrock = [
    "dep:awc",
    "dep:aws-config",
    "dep:aws-credential-types",
    "dep:aws-sdk-bedrockruntime",
    "dep:aws-smithy-types",
]
elevenlabs = []
agent = []

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_bytes = { version = "0.11.19" }
reqwest = { version = "0.12.12", default-features = false, features = ["json", "multipart", "stream"] }
serde_json = "1.0"
async-trait = "0.1"
thiserror = "1.0"
secrecy = { version = "0.8", features = ["serde"] }
bytes = "1.9"
tokio = { version = "1.0", features = ["full"] }
base64 = "0.22.1"
futures = "0.3"
serde_yaml = "0.9"
toml = "0.8"
dirs = "6.0.0"
either = { version = "1.15.0", features = ["serde"] }
regex = "1.10"
log = "0.4"
chrono = { version = "0.4", default-features = false, features = ["serde"] }
rand = "0.8"
awc = { version = "3.7.0", features = ["rustls-0_23-native-roots"], optional = true }
aws-config = { version = "1.7.15", optional = true }
aws-sdk-bedrockruntime = { version = "1.129.0", optional = true }
aws-credential-types = { version = "1.2.14", optional = true }
aws-smithy-types = { version = "1.4.7", optional = true }

[dev-dependencies]
tokio = { version = "1.0", features = ["macros", "rt-multi-thread"] }
rstest = "0.26"
http = "1.2"
http-body-util = "0.1"
hyper = "1.5"
tokio-test = "0.4"
mockito = "1.5"
insta = "1.39"
proptest = "1.4"
tempfile = "3.10"
